name: "Build Ubuntu deb & release"

on:
  push:
    tags:
      - 'release/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.6.2-kotodian.1). Only used for manual runs.'
        required: false

permissions:
  contents: write

jobs:
  build-deb:
    name: Build amd64 .deb
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            v="${GITHUB_REF#refs/tags/release/v}"
          else
            v="${{ inputs.version }}"
            if [ -z "$v" ]; then
              v="0.0.0-snapshot.$(date -u +%Y%m%d%H%M%S)"
            fi
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build hysteria (linux/amd64)
        env:
          HY_APP_VERSION: "v${{ steps.ver.outputs.version }}"
          HY_APP_PLATFORMS: "linux/amd64"
        run: python hyperbole.py build -r

      - name: Build .deb
        run: scripts/build-deb.sh "${{ steps.ver.outputs.version }}"

      - name: Generate checksum
        run: |
          cd build
          sha256sum hysteria_*.deb > hysteria_${{ steps.ver.outputs.version }}_amd64.deb.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hysteria-deb-${{ steps.ver.outputs.version }}
          path: |
            build/hysteria_*.deb
            build/hysteria_*.deb.sha256

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: Hysteria v${{ steps.ver.outputs.version }} (Kotodian fork)
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/hysteria_*.deb
            build/hysteria_*.deb.sha256
          body: |
            Kotodian fork release — includes `initialPacketSize` QUIC option and disconnect webhook logger.

            ## Install (Ubuntu 20.04+, amd64)

            ```bash
            DEB=hysteria_${{ steps.ver.outputs.version }}_amd64.deb
            wget "https://github.com/Kotodian/hysteria/releases/download/${{ github.ref_name }}/$DEB"
            sudo dpkg -i "$DEB"
            sudo cp /etc/hysteria/config.yaml.example /etc/hysteria/config.yaml
            sudo $EDITOR /etc/hysteria/config.yaml
            sudo systemctl enable --now hysteria-server.service
            ```
